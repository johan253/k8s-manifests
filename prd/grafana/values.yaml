adminUser: admin

service:
  type: ClusterIP
  port: 80

persistence:
  enabled: true
  storageClassName: local-path
  accessModes:
    - ReadWriteOnce
  size: 10Gi

grafana.ini:
  server:
    root_url: https://grafana.prd.johanhernandez.com
  auth.github:
    enabled: true
    allow_sign_up: true
    client_id: $__env{GF_AUTH_GITHUB_CLIENT_ID}
    client_secret: $__env{FG_AUTH_GITHUB_CLIENT_SECRET}
    scopes: user:email,read:org

    auth_url: https://github.com/login/oauth/authorize
    token_url: https://github.com/login/oauth/access_token
    api_url: https://api.github.com/user

    allowed_organizations: johansorg
    role_attribute_path: >
      contains(groups[*], 'johansorg/owner') && 'Admin' || 'Viewer'
  auth:
    disable_login_form: false

resources:
  requests:
    cpu: 100m
    memory: 256Mi

envFromSecret: grafana-github-oauth

initChownData:
  enabled: false
